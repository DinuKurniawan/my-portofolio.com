<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <!-- Background -->
  <rect width="400" height="220" fill="#0d0d18"/>

  <!-- Sidebar -->
  <rect width="42" height="220" fill="#0a0a14"/>
  <circle cx="21" cy="26" r="7" fill="#22d3ee" opacity="0.85"/>
  <rect x="11" y="48" width="20" height="3" rx="1.5" fill="#22d3ee" opacity="0.6"/>
  <rect x="11" y="57" width="20" height="3" rx="1.5" fill="#1e293b"/>
  <rect x="11" y="66" width="20" height="3" rx="1.5" fill="#1e293b"/>
  <rect x="11" y="75" width="20" height="3" rx="1.5" fill="#1e293b"/>
  <rect x="11" y="90" width="20" height="3" rx="1.5" fill="#1e293b"/>
  <rect x="11" y="99" width="20" height="3" rx="1.5" fill="#1e293b"/>
  <rect x="11" y="108" width="20" height="3" rx="1.5" fill="#1e293b"/>

  <!-- Topbar -->
  <rect x="42" y="0" width="358" height="36" fill="#0f0f1c"/>
  <text x="54" y="22" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="white">DataSight</text>
  <text x="54" y="32" font-family="Arial,sans-serif" font-size="7.5" fill="#475569">Analytics Dashboard</text>
  <!-- Date filter -->
  <rect x="290" y="10" width="100" height="16" rx="5" fill="#1e293b"/>
  <text x="340" y="21.5" font-family="Arial,sans-serif" font-size="8" fill="#64748b" text-anchor="middle">March 2026 &#9660;</text>

  <!-- ── Stat Cards ── -->
  <!-- Card A: Revenue -->
  <rect x="50" y="44" width="102" height="52" rx="7" fill="#12121f"/>
  <text x="60" y="60" font-family="Arial,sans-serif" font-size="7.5" fill="#64748b">Total Revenue</text>
  <text x="60" y="78" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="white">Rp 842M</text>
  <text x="60" y="90" font-family="Arial,sans-serif" font-size="8" fill="#10b981">&#9650; 12.4% vs last month</text>

  <!-- Card B: Users -->
  <rect x="160" y="44" width="102" height="52" rx="7" fill="#12121f"/>
  <text x="170" y="60" font-family="Arial,sans-serif" font-size="7.5" fill="#64748b">Active Users</text>
  <text x="170" y="78" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="white">24,891</text>
  <text x="170" y="90" font-family="Arial,sans-serif" font-size="8" fill="#22d3ee">&#9650; 8.1% vs last month</text>

  <!-- Card C: Orders -->
  <rect x="270" y="44" width="122" height="52" rx="7" fill="#12121f"/>
  <text x="280" y="60" font-family="Arial,sans-serif" font-size="7.5" fill="#64748b">Orders Today</text>
  <text x="280" y="78" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="white">1,247</text>
  <text x="280" y="90" font-family="Arial,sans-serif" font-size="8" fill="#f59e0b">&#9660; 2.3% vs yesterday</text>

  <!-- ── Bar Chart Panel ── -->
  <rect x="50" y="104" width="218" height="110" rx="7" fill="#12121f"/>
  <text x="62" y="120" font-family="Arial,sans-serif" font-size="9.5" font-weight="600" fill="#e2e8f0">Revenue Trend</text>
  <text x="62" y="131" font-family="Arial,sans-serif" font-size="7.5" fill="#475569">Sep 2025 – Mar 2026</text>

  <!-- Axes -->
  <line x1="72" y1="198" x2="258" y2="198" stroke="#1e293b" stroke-width="1"/>
  <line x1="72" y1="138" x2="72" y2="198" stroke="#1e293b" stroke-width="1"/>
  <!-- Y-axis ticks -->
  <line x1="70" y1="168" x2="74" y2="168" stroke="#1e293b" stroke-width="1"/>
  <line x1="70" y1="148" x2="74" y2="148" stroke="#1e293b" stroke-width="1"/>

  <!-- Bar gradient def -->
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- 7 bars (heights scaled to feel realistic) -->
  <rect x="80"  y="178" width="16" height="20" rx="3" fill="url(#bar)"/>
  <rect x="104" y="168" width="16" height="30" rx="3" fill="url(#bar)"/>
  <rect x="128" y="160" width="16" height="38" rx="3" fill="url(#bar)"/>
  <rect x="152" y="165" width="16" height="33" rx="3" fill="url(#bar)"/>
  <rect x="176" y="150" width="16" height="48" rx="3" fill="url(#bar)"/>
  <rect x="200" y="144" width="16" height="54" rx="3" fill="url(#bar)" opacity="0.75"/>
  <!-- Current month highlighted -->
  <rect x="224" y="138" width="16" height="60" rx="3" fill="#22d3ee" opacity="0.9"/>
  <!-- Tooltip on last bar -->
  <rect x="215" y="126" width="35" height="14" rx="3" fill="#22d3ee"/>
  <text x="232" y="136.5" font-family="Arial,sans-serif" font-size="7.5" font-weight="700" fill="#0a0a14" text-anchor="middle">842M</text>
  <polygon points="227,140 237,140 232,145" fill="#22d3ee"/>

  <!-- X labels -->
  <text x="88"  y="208" font-family="Arial,sans-serif" font-size="7" fill="#334155" text-anchor="middle">Sep</text>
  <text x="112" y="208" font-family="Arial,sans-serif" font-size="7" fill="#334155" text-anchor="middle">Oct</text>
  <text x="136" y="208" font-family="Arial,sans-serif" font-size="7" fill="#334155" text-anchor="middle">Nov</text>
  <text x="160" y="208" font-family="Arial,sans-serif" font-size="7" fill="#334155" text-anchor="middle">Dec</text>
  <text x="184" y="208" font-family="Arial,sans-serif" font-size="7" fill="#334155" text-anchor="middle">Jan</text>
  <text x="208" y="208" font-family="Arial,sans-serif" font-size="7" fill="#475569" text-anchor="middle">Feb</text>
  <text x="232" y="208" font-family="Arial,sans-serif" font-size="7" font-weight="700" fill="#22d3ee" text-anchor="middle">Mar</text>

  <!-- ── Donut Chart Panel ── -->
  <rect x="276" y="104" width="116" height="110" rx="7" fill="#12121f"/>
  <text x="286" y="120" font-family="Arial,sans-serif" font-size="9.5" font-weight="600" fill="#e2e8f0">Top Categories</text>

  <!-- Donut: r=22, C≈138, cx=334, cy=158 -->
  <!-- Base ring -->
  <circle cx="334" cy="158" r="22" fill="none" stroke="#1e293b" stroke-width="10"/>
  <!-- Seg 1: 40% = 55.3 units, start at top (-90deg) -->
  <circle cx="334" cy="158" r="22" fill="none" stroke="#22d3ee" stroke-width="10"
    stroke-dasharray="55 1000" stroke-dashoffset="0"
    transform="rotate(-90 334 158)"/>
  <!-- Seg 2: 25% = 34.5 units, start at 144deg = 54deg net -->
  <circle cx="334" cy="158" r="22" fill="none" stroke="#a855f7" stroke-width="10"
    stroke-dasharray="35 1000" stroke-dashoffset="0"
    transform="rotate(54 334 158)"/>
  <!-- Seg 3: 18% = 24.9 units, start at 234deg = 144deg net -->
  <circle cx="334" cy="158" r="22" fill="none" stroke="#f59e0b" stroke-width="10"
    stroke-dasharray="25 1000" stroke-dashoffset="0"
    transform="rotate(144 334 158)"/>
  <!-- Seg 4: 17% = 23.5 units, start at 298.8deg = 208.8deg net -->
  <circle cx="334" cy="158" r="22" fill="none" stroke="#10b981" stroke-width="10"
    stroke-dasharray="23 1000" stroke-dashoffset="0"
    transform="rotate(209 334 158)"/>
  <!-- Center label -->
  <text x="334" y="162" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">100%</text>

  <!-- Legend -->
  <rect x="280" y="193" width="7" height="7" rx="1.5" fill="#22d3ee"/>
  <text x="291" y="200" font-family="Arial,sans-serif" font-size="7" fill="#94a3b8">Food 40%</text>
  <rect x="328" y="193" width="7" height="7" rx="1.5" fill="#a855f7"/>
  <text x="339" y="200" font-family="Arial,sans-serif" font-size="7" fill="#94a3b8">Tech 25%</text>
  <rect x="280" y="205" width="7" height="7" rx="1.5" fill="#f59e0b"/>
  <text x="291" y="212" font-family="Arial,sans-serif" font-size="7" fill="#94a3b8">Health 18%</text>
  <rect x="328" y="205" width="7" height="7" rx="1.5" fill="#10b981"/>
  <text x="339" y="212" font-family="Arial,sans-serif" font-size="7" fill="#94a3b8">Other 17%</text>
</svg>
