<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <!-- Background -->
  <rect width="400" height="220" fill="#0d0d18"/>

  <!-- Navbar -->
  <rect width="400" height="38" fill="#12121f"/>
  <rect x="12" y="12" width="20" height="14" rx="4" fill="#6366f1"/>
  <text x="38" y="24" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="white">NusaFood</text>
  <!-- Search bar -->
  <rect x="140" y="10" width="152" height="18" rx="9" fill="#1c1c30"/>
  <text x="152" y="22.5" font-family="Arial,sans-serif" font-size="8.5" fill="#4a4a6a">Search restaurants...</text>
  <!-- Avatar -->
  <circle cx="374" cy="19" r="9" fill="#1c1c30"/>
  <circle cx="374" cy="19" r="7" fill="#6366f1" opacity="0.3"/>

  <!-- Category strip -->
  <rect x="0" y="38" width="400" height="30" fill="#0f0f1c"/>
  <rect x="12" y="44" width="44" height="18" rx="9" fill="#6366f1"/>
  <text x="34" y="56.5" font-family="Arial,sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">All</text>
  <rect x="62" y="44" width="54" height="18" rx="9" fill="#1a1a2f"/>
  <text x="89" y="56.5" font-family="Arial,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Pizza</text>
  <rect x="122" y="44" width="58" height="18" rx="9" fill="#1a1a2f"/>
  <text x="151" y="56.5" font-family="Arial,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Burger</text>
  <rect x="186" y="44" width="60" height="18" rx="9" fill="#1a1a2f"/>
  <text x="216" y="56.5" font-family="Arial,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Noodles</text>
  <rect x="252" y="44" width="56" height="18" rx="9" fill="#1a1a2f"/>
  <text x="280" y="56.5" font-family="Arial,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Drinks</text>

  <!-- Section label -->
  <text x="12" y="84" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="white">Featured Restaurants</text>

  <!-- ── Card 1 ── -->
  <rect x="12" y="92" width="116" height="116" rx="10" fill="#12121f"/>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <rect x="12" y="92" width="116" height="68" rx="10" fill="url(#g1)"/>
  <!-- restaurant icon -->
  <rect x="52" y="108" width="34" height="24" rx="3" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <rect x="46" y="105" width="46" height="5" rx="2" fill="rgba(255,255,255,0.35)"/>
  <rect x="63" y="118" width="12" height="14" rx="2" fill="rgba(255,255,255,0.3)"/>
  <text x="16" y="174" font-family="Arial,sans-serif" font-size="9.5" font-weight="700" fill="#f1f5f9">Pizza Hut Cibinong</text>
  <text x="16" y="186" font-family="Arial,sans-serif" font-size="8" fill="#64748b">&#9733; 4.8 · 25 min · Free</text>
  <rect x="16" y="192" width="52" height="10" rx="5" fill="#4f46e5" opacity="0.2"/>
  <text x="42" y="200.5" font-family="Arial,sans-serif" font-size="7.5" fill="#818cf8" text-anchor="middle">Fast Delivery</text>

  <!-- ── Card 2 ── -->
  <rect x="136" y="92" width="116" height="116" rx="10" fill="#12121f"/>
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#db2777" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0.45"/>
    </linearGradient>
  </defs>
  <rect x="136" y="92" width="116" height="68" rx="10" fill="url(#g2)"/>
  <!-- burger stack icon -->
  <rect x="179" y="110" width="32" height="5" rx="2.5" fill="rgba(255,255,255,0.5)"/>
  <rect x="175" y="117" width="40" height="5" rx="2.5" fill="rgba(255,255,255,0.35)"/>
  <rect x="179" y="124" width="32" height="5" rx="2.5" fill="rgba(255,255,255,0.5)"/>
  <text x="140" y="174" font-family="Arial,sans-serif" font-size="9.5" font-weight="700" fill="#f1f5f9">Smash Burger Co.</text>
  <text x="140" y="186" font-family="Arial,sans-serif" font-size="8" fill="#64748b">&#9733; 4.6 · 18 min · Rp5k</text>
  <rect x="140" y="192" width="44" height="10" rx="5" fill="#db2777" opacity="0.2"/>
  <text x="162" y="200.5" font-family="Arial,sans-serif" font-size="7.5" fill="#f472b6" text-anchor="middle">Popular</text>

  <!-- ── Card 3 ── -->
  <rect x="260" y="92" width="128" height="116" rx="10" fill="#12121f"/>
  <defs>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.45"/>
    </linearGradient>
  </defs>
  <rect x="260" y="92" width="128" height="68" rx="10" fill="url(#g3)"/>
  <!-- bowl icon -->
  <ellipse cx="324" cy="126" rx="20" ry="10" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <line x1="304" y1="126" x2="344" y2="126" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="315" y1="114" x2="313" y2="108" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
  <line x1="324" y1="112" x2="324" y2="106" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
  <line x1="333" y1="114" x2="335" y2="108" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
  <text x="264" y="174" font-family="Arial,sans-serif" font-size="9.5" font-weight="700" fill="#f1f5f9">Mie Gacoan</text>
  <text x="264" y="186" font-family="Arial,sans-serif" font-size="8" fill="#64748b">&#9733; 4.9 · 30 min · Free</text>
  <rect x="264" y="192" width="50" height="10" rx="5" fill="#0891b2" opacity="0.2"/>
  <text x="289" y="200.5" font-family="Arial,sans-serif" font-size="7.5" fill="#22d3ee" text-anchor="middle">Top Rated</text>

  <!-- Bottom nav hint -->
  <rect x="0" y="212" width="400" height="8" fill="#0a0a12"/>
  <circle cx="90" cy="216" r="2.5" fill="#6366f1"/>
  <circle cx="180" cy="216" r="2.5" fill="#2a2a40"/>
  <circle cx="270" cy="216" r="2.5" fill="#2a2a40"/>
  <circle cx="360" cy="216" r="2.5" fill="#2a2a40"/>
</svg>
